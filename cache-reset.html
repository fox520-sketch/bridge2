<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>清除合約橋牌快取</title>
  <style>body{font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#111827;color:#e5e7eb;display:grid;place-items:center;min-height:100vh;margin:0;padding:24px}main{max-width:520px;background:#1f2937;border:1px solid #475569;border-radius:22px;padding:26px;box-shadow:0 20px 60px #0006}h1{margin-top:0;color:#bfdbfe}button{font:inherit;font-weight:800;border:0;border-radius:14px;padding:12px 16px;background:#93c5fd;color:#0f172a;cursor:pointer}.muted{color:#cbd5e1;line-height:1.8}</style>
</head>
<body>
<main>
  <h1>清除舊版快取</h1>
  <p class="muted">若頁腳仍顯示 bridge-v1.0.24.11，請按下方按鈕清除舊 Service Worker 與 Cache，完成後會自動回到最新版。</p>
  <button id="resetBtn">清除快取並重新開啟</button>
  <p id="status" class="muted"></p>
</main>
<script>
async function reset(){
  const status=document.getElementById('status');
  status.textContent='正在清除 Service Worker 與快取...';
  try{
    if('serviceWorker' in navigator){
      const regs=await navigator.serviceWorker.getRegistrations();
      await Promise.all(regs.map(r=>r.unregister()));
    }
    if('caches' in window){
      const keys=await caches.keys();
      await Promise.all(keys.map(k=>caches.delete(k)));
    }
    status.textContent='完成，正在重新開啟最新版...';
    const base=location.pathname.replace(/cache-reset\.html$/,'');
    setTimeout(()=>location.replace(base+'?fresh=1.0.24.11-'+Date.now()),500);
  }catch(err){
    status.textContent='清除失敗：'+(err&&err.message?err.message:String(err));
  }
}
document.getElementById('resetBtn').addEventListener('click',reset);
</script>
</body>
</html>
